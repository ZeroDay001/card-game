<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карточная игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <h1>Карточная битва</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <form id="login-form" class="auth-form active">
            <input type="text" id="login-username" placeholder="Логин" required>
            <input type="password" id="login-password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>

        <form id="register-form" class="auth-form">
            <input type="text" id="register-username" placeholder="Логин" required>
            <input type="password" id="register-password" placeholder="Пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>

        <div id="auth-message" class="message"></div>
    </div>

    <!-- Главное меню (после входа) -->
    <div id="main-screen" class="screen hidden">
        <div class="header">
            <span>Добро пожаловать, <span id="username-display"></span>!</span>
            <button id="logout-btn" class="secondary small">Выйти</button>
        </div>
        <button id="host-game">Создать игру (хост)</button>
        <div class="or">или</div>
        <input type="text" id="room-id-input" placeholder="ID комнаты (если нужно)">
        <button id="join-game">Подключиться</button>
        <hr>
        <button id="edit-cards-btn" class="secondary">Редактор карт</button>
        <button id="edit-deck-btn" class="secondary">Конструктор колоды</button>
    </div>

    <!-- Редактор карт -->
    <div id="editor-screen" class="screen hidden">
        <h2>Редактор карт</h2>
        <form id="card-form">
            <input type="hidden" id="card-id">
            <input type="text" id="card-name" placeholder="Название" required>
            <textarea id="card-description" placeholder="Описание"></textarea>
            <input type="number" id="card-attack" placeholder="Атака" required>
            <input type="number" id="card-health" placeholder="Здоровье" required>
            <input type="text" id="card-bonus" placeholder="Бонусный эффект">
            <input type="file" id="card-image" accept="image/*">
            <div id="image-preview"></div>
            <button type="submit">Сохранить карту</button>
            <button type="button" id="cancel-edit">Отмена</button>
        </form>
        <h3>Мои карты</h3>
        <div id="cards-list" class="cards-grid"></div>
        <button id="back-to-main-from-editor">Назад</button>
    </div>

    <!-- Конструктор колоды -->
    <div id="deck-screen" class="screen hidden">
        <h2>Конструктор колоды</h2>
        <div id="deck-stats">Колода: <span id="deck-count">0</span>/50 карт</div>
        <div id="deck-cards-list" class="cards-grid"></div>
        <h3>Доступные карты</h3>
        <div id="available-cards-list" class="cards-grid"></div>
        <button id="back-to-main-from-deck">Назад</button>
    </div>

    <!-- Игровой экран -->
    <div id="game-screen" class="screen hidden">
        <div class="game-board">
            <div class="opponent-area">
                <div class="hero-info">
                    <span class="hero-health" id="opponent-health">30</span>
                    <span class="mana" id="opponent-mana">⚡0/0</span>
                </div>
                <div class="battlefield" id="opponent-field"></div>
                <div class="hand" id="opponent-hand"></div>
            </div>

            <div class="status-bar">
                <span id="turn-indicator">Ваш ход</span>
                <button id="end-turn-btn">Завершить ход</button>
            </div>

            <div class="player-area">
                <div class="hand" id="player-hand"></div>
                <div class="battlefield" id="player-field"></div>
                <div class="hero-info">
                    <span class="hero-health" id="player-health">30</span>
                    <span class="mana" id="player-mana">⚡0/0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
